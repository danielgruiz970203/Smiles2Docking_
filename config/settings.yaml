input:
  source_type: spreadsheet
  file_path: ""
  sheet_name: null
  smiles_column: smiles
  access_code_column: access_code

processing:
  preserve_kekule: true
  strict_fragment_disambiguation: true
  skip_undefined_stereo: false
  strict_stereochemistry: false
  single_undefined_stereocenter_only: false
  max_stereochemistry_variants: 16
  allow_post_mopac_charge_rescue: true

protonation:
  enabled: true
  backend: molgpka           # molgpka | dimorphite | dimorphite_pick | openbabel | none
  ph: 7.4
  amine_prior: true          # molgpka: chemical prior fixing OOD small aliphatic amines
  obabel_binary: obabel
  temp_dir: data/intermediate/tmp/protonation
  # Dimorphite-DL backend parameters
  enumerate: true            # dimorphite: return ALL plausible states (not one)
  ph_tolerance: 1.0
  max_variants: 128          # dimorphite enumeration cap
  variant_selection: first   # dimorphite_pick only: first | most_neutral
  pka_precision: 1.0

tautomer:
  enabled: false             # optional: pick the dominant tautomer before protonation
  backend: sphysnet          # sphysnet (sPhysNet-Taut, external) | rdkit (canonical)
  max_tautomers: 16          # rdkit backend only
  sphysnet:                  # external tool; user installs it (see README)
    script_path: ""          # path to sPhysNet-Taut/predict_tautomer.py
    python: ""               # python executable of the tautomer_selection env (blank = 'python')
    num_confs: 50            # conformers sampled per molecule

pm7:
  enabled: false
  method: PM7
  binary_name: mopac
  binary_path: ""
  use_mmok: true
  use_eps: true
  eps: 78.39
  preserve_files: false
  preserved_files_dir: ""
  temp_dir: data/intermediate/tmp/mopac

structure_generation:
  embed_seed: 61453
  max_attempts: 3
  optimize_geometry: true
  force_field_preference:
    - mmff94
    - mmff94s
    - uff
  max_optimization_iterations: 1000
  allow_unoptimized_output: false

export:
  output_dir: data/processed
  overwrite: true
  temp_dir: data/intermediate/tmp/export
  mode: separate_mol2
  bundle_basename: ""
  # Meeko-based PDBQT export options (used for *_pdbqt modes)
  pdbqt:
    rigid: false
    add_hydrogens: true
    # Keep all hydrogens (incl. nonpolar) so the PDBQT shows the full H set.
    # AutoDock classically merges nonpolar H (united-atom); set to false to
    # restore that convention if a docking engine requires it.
    keep_nonpolar_hydrogens: true
    charge_model: gasteiger

parallel:
  enabled: false             # true to fan records across worker processes
  n_jobs: -1                 # -1 = all CPUs; 1 = sequential; N = N workers
  backend: loky              # joblib backend (loky isolates workers)
  batch_size: auto           # joblib batch_size

reporting:
  enabled: true              # write the per-run JSON audit report (one entry per compound)
  report_dir: data/reports
  use_output_dir: true

logging:
  log_dir: logs
  file_name: workflow.log
  level: INFO
  use_output_dir: true

ui:
  language: en
